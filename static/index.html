<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered fruit freshness detection using deep learning. Upload an image to instantly classify fruits as fresh or rotten.">
    <title>Fruit Freshness AI — Freshness Detector</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6'/></svg>">
</head>
<body>
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="preloader-content">
            <div class="preloader-spinner"></div>
        </div>
    </div>

    <!-- Ambient Background Orbs -->
    <div class="ambient-bg" aria-hidden="true">
        <div class="ambient-orb orb-1"></div>
        <div class="ambient-orb orb-2"></div>
        <div class="ambient-orb orb-3"></div>
    </div>

    <div class="app-container">

        <!-- ── Header ── -->
        <header class="header">
            <div class="header-icon-wrapper" aria-hidden="true">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="14.31" y1="8" x2="20.05" y2="17.94"/>
                    <line x1="9.69" y1="8" x2="21.17" y2="8"/>
                    <line x1="7.38" y1="12" x2="13.12" y2="2.06"/>
                    <line x1="9.69" y1="16" x2="3.95" y2="6.06"/>
                    <line x1="14.31" y1="16" x2="2.83" y2="16"/>
                    <line x1="16.62" y1="12" x2="10.88" y2="21.94"/>
                </svg>
            </div>
            <h1 class="header-title">Fruit Freshness AI</h1>
            <p class="header-subtitle">Powered by MobileNetV3 · Drop an image to detect freshness instantly</p>
        </header>

        <!-- ── Upload Section ── -->
        <section class="upload-section" id="upload-section">
            <div class="glass-card upload-zone" id="upload-zone" role="button" tabindex="0" aria-label="Upload image for prediction">
                <div class="upload-icon-wrapper" aria-hidden="true">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </div>
                <p class="upload-title">Drag & Drop Image(s) Here</p>
                <p class="upload-subtitle">or <span id="browse-trigger">browse files</span> · JPG, PNG, WebP</p>
                <input type="file" class="file-input" id="file-input" accept="image/*" multiple>
            </div>

            <!-- Preview Strip -->
            <div class="preview-strip" id="preview-strip"></div>

            <!-- Predict Button -->
            <div class="predict-btn-wrapper" id="predict-btn-wrapper" style="display: none;">
                <button class="predict-btn" id="predict-btn" type="button">
                    <div class="spinner"></div>
                    <span class="btn-text">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; vertical-align: text-bottom;">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        Analyze Freshness
                    </span>
                </button>
            </div>
        </section>

        <!-- ── Results Section ── -->
        <section class="results-section" id="results-section">
            <h2 class="results-header" id="results-header">Results</h2>

            <!-- Batch Summary (hidden for single) -->
            <div class="glass-card-strong batch-summary" id="batch-summary" style="display: none;">
                <div class="batch-stat">
                    <span class="batch-stat-value total-text" id="batch-total">0</span>
                    <span class="batch-stat-label">Total</span>
                </div>
                <div class="batch-stat">
                    <span class="batch-stat-value fresh-text" id="batch-fresh">0</span>
                    <span class="batch-stat-label">Fresh</span>
                </div>
                <div class="batch-stat">
                    <span class="batch-stat-value rotten-text" id="batch-rotten">0</span>
                    <span class="batch-stat-label">Rotten</span>
                </div>
            </div>

            <!-- Result Cards Container -->
            <div id="results-container"></div>
        </section>

        <!-- ── Footer ── -->
        <footer class="footer">
            <div class="footer-glass">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; vertical-align: text-bottom;">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
                    <rect x="9" y="9" width="6" height="6"/>
                    <line x1="9" y1="1" x2="9" y2="4"/>
                    <line x1="15" y1="1" x2="15" y2="4"/>
                    <line x1="9" y1="20" x2="9" y2="23"/>
                    <line x1="15" y1="20" x2="15" y2="23"/>
                    <line x1="20" y1="9" x2="23" y2="9"/>
                    <line x1="20" y1="14" x2="23" y2="14"/>
                    <line x1="1" y1="9" x2="4" y2="9"/>
                    <line x1="1" y1="14" x2="4" y2="14"/>
                </svg>
                <span>MobileNetV3-Large · PyTorch · 18 Classes</span>
            </div>
        </footer>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <div class="toast-content" id="toast-content"></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
